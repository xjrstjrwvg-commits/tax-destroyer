<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>UltraEngine風 ソルバー</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fafafa;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    color: #333;
}

/* 入力欄 */
input[type="text"], select {
    width: 100%;
    font-size: 20px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #f9f9f9;
    margin-top: 10px;
}

/* チェックボックス */
input[type="checkbox"] {
    width: 24px;
    height: 24px;
    transform: scale(1.3);
    margin-right: 6px;
}

/* ボタン */
button {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border: none;
    border-radius: 6px;
    background: #007aff;
    color: white;
    margin-top: 14px;
}

/* 辞書選択 */
.dict-select {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}
.dict-option {
    flex: 1;
    background: #f9f9f9;
    padding: 10px;
    border-radius: 6px;
    text-align: center;
    border: 1px solid #ccc;
}
.dict-option.selected {
    border-color: #007aff;
    background: #e8f0ff;
}

/* 結果カード */
.resultCard {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 12px;
    margin-top: 14px;
    font-size: 18px;
}
.copyBtnSmall {
    background: #007aff;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>ソルバー</h2>

<input id="pattern" type="text" placeholder="例：〇①〇〇②">

<div class="dict-select">
    <label class="dict-option selected" id="opt-country">
        <input type="radio" name="dict" value="country" checked> 国名
    </label>
    <label class="dict-option" id="opt-capital">
        <input type="radio" name="dict" value="capital"> 首都
    </label>
    <label class="dict-option" id="opt-both">
        <input type="radio" name="dict" value="both"> 両方
    </label>
</div>

<div style="margin-top:10px;">
    <input type="checkbox" id="shiritori">
    <label for="shiritori">しりとりモード</label>
</div>

<div style="margin-top:10px;">
    <input type="checkbox" id="normalizeDakuten">
    <label for="normalizeDakuten">濁点・小文字を同一視</label>
</div>

<button onclick="runSolve()">解く</button>

<div id="result"></div>

<script src="dictionary.js"></script>

<script>
/* ============================
   濁点・小文字同一視
============================ */
function normalizeDakutenSmall(str) {
    const map = {
        "ァ":"ア","ア":"ア","ィ":"イ","イ":"イ","ゥ":"ウ","ウ":"ウ","ェ":"エ","エ":"エ","ォ":"オ","オ":"オ",
        "ガ":"カ","カ":"カ","ギ":"キ","キ":"キ","グ":"ク","ク":"ク","ゲ":"ケ","ケ":"ケ","ゴ":"コ","コ":"コ",
        "ザ":"サ","サ":"サ","ジ":"シ","シ":"シ","ズ":"ス","ス":"ス","ゼ":"セ","セ":"セ","ゾ":"ソ","ソ":"ソ",
        "ダ":"タ","タ":"タ","ヂ":"チ","チ":"チ","ヅ":"ツ","ツ":"ツ","デ":"テ","テ":"テ","ド":"ト","ト":"ト",
        "バ":"ハ","パ":"ハ","ハ":"ハ","ビ":"ヒ","ピ":"ヒ","ヒ":"ヒ","ブ":"フ","プ":"フ","フ":"フ",
        "ベ":"ヘ","ペ":"ヘ","ヘ":"ヘ","ボ":"ホ","ポ":"ホ","ホ":"ホ"
    };
    let out = "";
    for (const ch of str) out += map[ch] || ch;
    return out;
}

/* ============================
   入力正規化（〇①②→数字）
============================ */
function normalizeInput(str) {
    str = str.replace(/○/g, "〇");
    const circled = { "①":"1","②":"2","③":"3","④":"4","⑤":"5","⑥":"6","⑦":"7","⑧":"8","⑨":"9" };
    return str.replace(/[①②③④⑤⑥⑦⑧⑨]/g, ch => circled[ch]);
}

/* ============================
   パターン一致
============================ */
function matchPattern(pattern, word, useDakutenMode) {
    if (pattern.length !== word.length) return false;
    if (useDakutenMode) word = normalizeDakutenSmall(word);

    const mapNumToChar = {};
    const usedChars = {};

    for (let i=0;i<pattern.length;i++){
        const p = pattern[i];
        const w = word[i];

        if (p === "〇") continue;

        if (/[0-9]/.test(p)) {
            if (!mapNumToChar[p]) {
                if (usedChars[w] && usedChars[w] !== p) return false;
                mapNumToChar[p] = w;
                usedChars[w] = p;
            } else {
                if (mapNumToChar[p] !== w) return false;
            }
        } else {
            if (p !== w) return false;
        }
    }
    return true;
}

/* ============================
   しりとり連結
============================ */
function generateShiritoriChains(list, maxLength=4){
    const results=[];
    function dfs(chain,last){
        if(chain.length>=maxLength) return;
        for(const c of list){
            if(chain.includes(c)) continue;
            if(last && !c.startsWith(last)) continue;
            const newChain=[...chain,c];
            results.push(newChain);
            dfs(newChain,c[c.length-1]);
        }
    }
    for(const c of list){
        dfs([c],c[c.length-1]);
    }
    return results;
}

/* ============================
   ソルバー本体
============================ */
function runSolve(){
    const pattern = normalizeInput(document.getElementById("pattern").value);
    const dictMode = document.querySelector("input[name=dict]:checked").value;
    const shiritoriMode = document.getElementById("shiritori").checked;
    const useDakutenMode = document.getElementById("normalizeDakuten").checked;

    let list=[];
    if(dictMode==="country") list=window.DICT.country;
    if(dictMode==="capital") list=window.DICT.capital;
    if(dictMode==="both") list=[...window.DICT.country,...window.DICT.capital];

    let results=[];

    if(shiritoriMode){
        const chains = generateShiritoriChains(list,4);
        for(const chain of chains){
            let joined = chain.join("");
            let normalizedJoined = useDakutenMode ? normalizeDakutenSmall(joined) : joined;
            if(matchPattern(pattern, normalizedJoined, useDakutenMode)){
                results.push(chain);
            }
        }
    } else {
        for(const w of list){
            let ww = useDakutenMode ? normalizeDakutenSmall(w) : w;
            if(matchPattern(pattern, ww, useDakutenMode)){
                results.push([w]);
            }
        }
    }

    const area = document.getElementById("result");
    area.innerHTML = "";

    if(results.length===0){
        area.innerHTML = "一致なし";
        return;
    }

    area.innerHTML = `=== ${results.length} 件一致 ===<br><br>`;

    for(const chain of results){
        const text = chain.join(" → ");
        const card = `
            <div class="resultCard">
                ${text}<br>
                <button class="copyBtnSmall" onclick="navigator.clipboard.writeText('${text}')">コピー</button>
            </div>
        `;
        area.innerHTML += card;
    }
}

/* ============================
   辞書選択の見た目
============================ */
document.querySelectorAll(".dict-option").forEach(opt=>{
    opt.addEventListener("click",()=>{
        document.querySelectorAll(".dict-option").forEach(o=>o.classList.remove("selected"));
        opt.classList.add("selected");
    });
});
</script>

</body>
</html>
