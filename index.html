<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>開始字→終了字チェーン集計ツール</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    max-width: 700px;
    margin: auto;
}

.card {
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

input, select {
    font-size: 18px;
    padding: 8px;
    width: 100%;
    margin-top: 6px;
    margin-bottom: 12px;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    background: #007aff;
    color: white;
    border: none;
    border-radius: 8px;
}

pre {
    background: #f5f5f5;
    padding: 16px;
    border-radius: 8px;
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>開始字→終了字チェーン通り数集計</h2>

<div class="card">
    <label>国数（N）</label>
    <input id="chainN" type="number" value="3" min="2">

    <label>辞書</label>
    <select id="dictMode">
        <option value="country">国名</option>
        <option value="capital">首都</option>
        <option value="both">両方</option>
    </select>

    <label>開始字（空欄なら全て）</label>
    <input id="startChar" type="text" placeholder="例：ア">

    <label>0件フィルタ</label>
    <select id="zeroFilter">
        <option value="all">全て表示</option>
        <option value="exclude">0件を除外</option>
        <option value="only">0件のみ表示</option>
    </select>

    <label>ソート順</label>
    <select id="sortMode">
        <option value="gojuon">50音順</option>
        <option value="asc">通り数が少ない順</option>
        <option value="desc">通り数が多い順</option>
        <option value="random">ランダム</option>
    </select>

    <button onclick="runCount()">集計する</button>
</div>

<div class="card">
    <pre id="result">ここに結果が表示されます</pre>
</div>

<script src="dictionary.js"></script>

<script>
// ===============================
// Nカ国しりとりチェーンを集計
// ===============================
function countChainsByStartEnd(list, N, startFilter) {
    const result = {}; // "ア→イ": 数

    function dfs(chain) {
        if (chain.length === N) {
            const s = chain[0][0];
            const e = chain[N-1].slice(-1);
            const key = `${s}→${e}`;
            if (!result[key]) result[key] = 0;
            result[key]++;
            return;
        }

        const last = chain[chain.length - 1];
        const nextHead = last.slice(-1);

        for (const w of list) {
            if (chain.includes(w)) continue;
            if (!w.startsWith(nextHead)) continue;
            dfs([...chain, w]);
        }
    }

    for (const w of list) {
        if (startFilter && !w.startsWith(startFilter)) continue;
        dfs([w]);
    }

    return result;
}

// ===============================
// UI 実行
// ===============================
function runCount() {
    const N = Number(document.getElementById("chainN").value);
    const dictMode = document.getElementById("dictMode").value;
    const startChar = document.getElementById("startChar").value.trim();
    const zeroFilter = document.getElementById("zeroFilter").value;
    const sortMode = document.getElementById("sortMode").value;

    let list = [];
    if (dictMode === "country") list = window.DICT.country;
    if (dictMode === "capital") list = window.DICT.capital;
    if (dictMode === "both") list = [...window.DICT.country, ...window.DICT.capital];

    const res = countChainsByStartEnd(list, N, startChar || null);

    let entries = Object.entries(res);

    // 0件フィルタ
    if (zeroFilter === "exclude") {
        entries = entries.filter(([k, v]) => v > 0);
    } else if (zeroFilter === "only") {
        entries = entries.filter(([k, v]) => v === 0);
    }

    // ソート
    if (sortMode === "gojuon") {
        entries.sort((a, b) => a[0].localeCompare(b[0], "ja"));
    } else if (sortMode === "asc") {
        entries.sort((a, b) => a[1] - b[1]);
    } else if (sortMode === "desc") {
        entries.sort((a, b) => b[1] - a[1]);
    } else if (sortMode === "random") {
        entries.sort(() => Math.random() - 0.5);
    }

    let out = "";
    for (const [key, val] of entries) {
        out += `${key}　${val}通り\n`;
    }

    document.getElementById("result").textContent = out || "該当なし";
}
</script>

</body>
</html>
