<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ULTRA ENGINE Pro</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html,body{overflow-x:hidden;touch-action:pan-y;}

    /* 🌗 白文字ナイトモード（OSの背景はそのまま） */
    .dark { background-color: transparent !important; }
    .dark * { color:#ffffff !important; }

    input,select,textarea{
      background:#f1f5f9;
      border-radius:12px;
      padding:6px 8px;
      font-size:11px;
      font-weight:bold;
    }
    .dark input,.dark select,.dark textarea{
      background:#1e293b !important;
      color:#ffffff !important;
    }

    .step-btn{
      background:#e2e8f0;
      width:28px;height:28px;
      border-radius:8px;
      font-weight:900;
      font-size:12px;
    }
    .dark .step-btn{
      background:#334155 !important;
      color:#ffffff !important;
    }

    .glass{
      background:rgba(255,255,255,0.9);
      backdrop-filter:blur(18px);
      border:1px solid rgba(148,163,184,0.35);
    }
    .dark .glass{
      background:rgba(15,23,42,0.9) !important;
      border-color:rgba(30,64,175,0.6) !important;
    }

    ::-webkit-scrollbar{display:none;}
  </style>
</head>

<body class="bg-slate-100 dark:bg-slate-950 text-slate-900 dark:text-slate-100 p-3 pb-24"
      oninput="saveSettings()" onchange="saveSettings()">

<div class="max-w-md mx-auto space-y-3">

  <!-- ヘッダー -->
  <header class="flex items-center justify-between py-1">
    <div class="flex flex-col leading-tight">
      <span class="text-[11px] font-black tracking-[0.2em] text-slate-400 uppercase">Word Route Explorer</span>
      <h1 class="text-xl font-black tracking-tight text-blue-600 dark:text-blue-400">ULTRA ENGINE Pro</h1>
    </div>

    <button type="button"
            onclick="toggleDarkMode()"
            class="w-9 h-9 rounded-full bg-slate-900 text-white flex items-center justify-center text-lg shadow">
      🌗
    </button>
  </header>

  <!-- メインカード -->
  <div class="glass rounded-3xl p-4 space-y-3">

    <!-- 上に置く開始条件 -->
    <div class="space-y-2">
      <div>
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">開始単語</label>
        <input id="sw" class="w-full" placeholder="例: ニホン">
      </div>

      <div class="grid grid-cols-3 gap-2">
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">開始字</label>
          <input id="sc" class="w-full" placeholder="ア">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">終了字</label>
          <input id="ec" class="w-full" placeholder="ン">
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">必須文字</label>
          <input id="mc" class="w-full" placeholder="ア:2,イ=1">
        </div>
      </div>
    </div>

    <!-- 詳細設定 -->
    <details class="group border border-slate-200 dark:border-slate-700 rounded-2xl px-3 py-2">
      <summary class="flex items-center justify-between cursor-pointer select-none">
        <span class="text-[11px] font-bold tracking-widest text-slate-500 dark:text-slate-300 uppercase">詳細設定</span>
        <span class="text-xs text-slate-400 group-open:hidden">OPEN</span>
        <span class="text-xs text-slate-400 hidden group-open:inline">CLOSE</span>
      </summary>

      <div class="pt-3 space-y-3 text-[11px]">

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">全語開始字</label>
            <input id="asc" class="w-full" placeholder="ア,カ,サ">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">全語終了字</label>
            <input id="aec" class="w-full" placeholder="ン,ク">
          </div>
        </div>

        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">使える文字</label>
          <input id="valid_chars" class="w-full" placeholder="アイウエオカキクケコ">
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">使用不可文字</label>
            <input id="exc" class="w-full" placeholder="例: ァ,ィ">
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">禁止開始文字</label>
            <input id="bsc" class="w-full" placeholder="例: ン">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ソート順</label>
            <select id="sort_mode" class="w-full">
              <option value="default">検索順</option>
              <option value="kana">50音順</option>
              <option value="len_asc">短い順</option>
              <option value="len_desc">長い順</option>
              <option value="random">ランダム</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">統一適用範囲</label>
            <select id="unify_scope" class="w-full">
              <option value="all">すべて</option>
              <option value="conn">接続のみ</option>
              <option value="filter">制約のみ</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-1 text-[11px] font-bold">
          <label><input type="checkbox" id="allow_daku"> 濁点許可</label>
          <label><input type="checkbox" id="allow_handaku"> 半濁点許可</label>
          <label><input type="checkbox" id="unify_small"> 小文字統一</label>
          <label><input type="checkbox" id="char_limit_mode"> 文字重複禁止</label>
          <label><input type="checkbox" id="auto_recovery"> 遡り接続</label>
          <label><input type="checkbox" id="rt"> 牛耕</label>
          <label><input type="checkbox" id="use_shift"> 50音ずらし</label>
          <label><input type="checkbox" id="exclude_conjugate"> 共役排除</label>
        </div>

        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ずらし量</span>
          <button type="button" onclick="adjustVal('ks_abs',-1)" class="step-btn">-</button>
          <input id="ks_abs" type="number" value="1" class="w-12 text-center">
          <button type="button" onclick="adjustVal('ks_abs',1)" class="step-btn">+</button>
        </div>

        <div class="flex items-center justify-between">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">物理ずらし</label>
          <input id="ps" type="number" value="0" class="w-16 text-center">
        </div>

        <div class="flex items-center justify-between">
          <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">文字計</label>
          <input id="ttl" type="number" class="w-16 text-center">
        </div>

      </div>
    </details>

    <!-- 詳細設定の下に置くブロック -->
    <div class="mt-2 space-y-2 border-t border-slate-200 dark:border-slate-700 pt-2">

      <!-- 単語数 -->
      <div class="flex items-center justify-between">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">単語数</label>
        <div class="flex items-center gap-2">
          <button type="button" onclick="adjustVal('ml',-1)" class="step-btn">-</button>
          <input id="ml" type="number" value="5" class="w-12 text-center">
          <button type="button" onclick="adjustVal('ml',1)" class="step-btn">+</button>
        </div>
      </div>

      <!-- リアルタイム表示 ON/OFF -->
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-1 text-[10px] font-bold text-blue-600">
          <input type="checkbox" id="realtime_enabled" checked>
          有効リアルタイム表示
        </label>
        <div class="text-[10px] text-slate-400">探索後に件数を表示</div>
      </div>

      <!-- タイムアウト / 件数制限 -->
      <div class="grid grid-cols-2 gap-2">
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-1 text-[10px] font-bold text-rose-500">
            <input type="checkbox" id="timeout_enabled">
            タイムアウト
          </label>
          <input id="timeout_sec" type="number" value="15" class="w-16 text-center text-[11px]">
        </div>
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-1 text-[10px] font-bold text-emerald-600">
            <input type="checkbox" id="limit_enabled">
            件数制限
          </label>
          <input id="limit" type="number" value="100" class="w-16 text-center text-[11px]">
        </div>
      </div>

      <!-- コピー制限 -->
      <div class="flex items-center justify-between">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">コピー制限数</label>
        <input id="copy_limit" type="number" value="10" class="w-16 text-center text-[11px]">
      </div>

      <!-- 開始ボタン -->
      <div class="flex items-center justify-between pt-1">
        <button type="button" onclick="copyTopN()" class="px-3 py-2 rounded-2xl bg-blue-600/10 text-blue-600 text-[10px] font-black uppercase tracking-widest">
          Top N Copy
        </button>
        <button type="button" id="btn" onclick="run()" class="px-6 py-2.5 rounded-2xl bg-blue-600 text-white text-[11px] font-black uppercase tracking-[0.2em] shadow">
          Explore
        </button>
      </div>

      <!-- stats（リアルタイム表示） -->
      <div id="stats" class="text-center text-[10px] font-black text-blue-500 py-1 hidden"></div>

      <!-- 辞書カテゴリ -->
      <div class="flex items-center justify-between pt-1">
        <div class="flex gap-3 text-[11px] font-bold">
          <label class="cursor-pointer text-blue-500 flex items-center gap-1">
            <input type="checkbox" name="cat" value="country" checked onchange="loadDictionaryUI()"> 国
          </label>
          <label class="cursor-pointer text-blue-500 flex items-center gap-1">
            <input type="checkbox" name="cat" value="capital" onchange="loadDictionaryUI()"> 首都
          </label>
        </div>
      </div>

    </div>

    <!-- 結果 -->
    <div id="res" class="space-y-3 pt-2 pb-16"></div>

  </div>
</div>

<!-- 辞書マネージャ -->
<div id="dict-manager" class="hidden fixed inset-0 z-50 bg-white dark:bg-slate-950 p-5 overflow-y-auto">
  <button type="button" onclick="document.getElementById('dict-manager').classList.add('hidden')" class="mb-4 font-bold text-rose-500 text-sm">
    CLOSE
  </button>
  <div class="grid grid-cols-2 gap-2 mb-4">
    <button type="button" onclick="bulkSet('white')" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl font-bold text-[11px]">
      全開放
    </button>
    <button type="button" onclick="bulkSet('red')" class="bg-rose-100 dark:bg-rose-900/40 text-rose-600 p-3 rounded-xl font-bold text-[11px]">
      全禁止
    </button>
  </div>
  <div id="dict-list" class="grid grid-cols-2 gap-1 text-[11px]"></div>
</div>

<button type="button"
        onclick="document.getElementById('dict-manager').classList.remove('hidden')"
        class="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.25em] opacity-80 hover:opacity-100">
  Dictionary
</button>

<!-- SCRIPT は Part2 で送る -->
<script>
let currentRoutes = [];
let wordStates = {};

function toggleDarkMode() {
  document.documentElement.classList.toggle('dark');
  saveSettings();
}

function adjustVal(id, delta) {
  const el = document.getElementById(id);
  el.value = Math.max(0, parseInt(el.value || 0) + delta);
  saveSettings();
}

function to_katakana(text) {
  return text.replace(/[ぁ-ん]/g, s => String.fromCharCode(s.charCodeAt(0) + 0x60));
}

function getWordStyle(state) {
  if (state === 'red') return "background-color:#f43f5e;color:white;border-color:#e11d48;";
  if (state === 'blue') return "background-color:#2563eb;color:white;border-color:#1d4ed8;";
  return "";
}

async function init() {
  if (localStorage.ultraSettings) {
    const s = JSON.parse(localStorage.ultraSettings);

    const fields = [
      'sw','sc','asc','mc','ec','aec','exc','bsc','ml','ps','ks_abs','ttl',
      'sort_mode','unify_scope','copy_limit','valid_chars','len_mode',
      'timeout_sec','limit'
    ];
    fields.forEach(f => {
      if (s[f] !== undefined && document.getElementById(f))
        document.getElementById(f).value = s[f];
    });

    const checks = [
      'allow_daku','allow_handaku','char_limit_mode','auto_recovery','unify_small',
      'rt','use_shift','exclude_conjugate','timeout_enabled','limit_enabled',
      'realtime_enabled'
    ];
    checks.forEach(f => {
      if (s[f] !== undefined && document.getElementById(f))
        document.getElementById(f).checked = s[f];
    });

    if (s.dark_mode) document.documentElement.classList.add('dark');
    if (s.wordStates) wordStates = s.wordStates;
  }

  await loadDictionaryUI();
}

async function loadDictionaryUI() {
  const r = await fetch('/get_dictionary');
  const dict = await r.json();
  const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value);

  let words = [];
  cats.forEach(c => words = words.concat(dict[c] || []));
  words = Array.from(new Set(words)).sort();

  document.getElementById('dict-list').innerHTML = words.map(w => {
    const s = wordStates[w] || 'white';
    return `<button onclick="toggleWordState(this,'${w}')"
            class="p-2 rounded-lg border text-[10px] font-bold"
            style="${getWordStyle(s)}">${w}</button>`;
  }).join('');
}

function toggleWordState(btn, word) {
  const states = { white:'red', red:'blue', blue:'white' };
  wordStates[word] = states[wordStates[word] || 'white'];
  saveSettings();
  loadDictionaryUI();
}

function bulkSet(state) {
  const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value);
  fetch('/get_dictionary').then(r => r.json()).then(dict => {
    cats.forEach(c => {
      (dict[c] || []).forEach(w => { wordStates[w] = state; });
    });
    saveSettings();
    loadDictionaryUI();
  });
}

function saveSettings() {
  localStorage.ultraSettings = JSON.stringify({
    sw: sw.value, sc: sc.value, asc: asc.value, mc: mc.value, ec: ec.value,
    aec: aec.value, exc: exc.value, bsc: bsc.value, ml: ml.value,
    ps: ps.value, ks_abs: ks_abs.value, ttl: ttl.value,
    sort_mode: sort_mode.value, unify_scope: unify_scope.value,
    copy_limit: copy_limit.value, valid_chars: valid_chars.value,
    len_mode: len_mode?.value || "free",
    timeout_sec: timeout_sec.value, limit: limit.value,

    allow_daku: allow_daku.checked, allow_handaku: allow_handaku.checked,
    char_limit_mode: char_limit_mode.checked, auto_recovery: auto_recovery.checked,
    unify_small: unify_small.checked, rt: rt.checked, use_shift: use_shift.checked,
    exclude_conjugate: exclude_conjugate.checked,
    timeout_enabled: timeout_enabled.checked,
    limit_enabled: limit_enabled.checked,
    realtime_enabled: realtime_enabled.checked,

    dark_mode: document.documentElement.classList.contains('dark'),
    wordStates: wordStates
  });
}

function resetSettings() {
  localStorage.removeItem('ultraSettings');
  location.reload();
}

async function run() {
  const btn = document.getElementById('btn');
  btn.innerText = "EXPLORING...";
  btn.disabled = true;

  try {
    const body = {
      start_word: sw.value,
      start_char: sc.value,
      all_start_char: asc.value,
      must_char: mc.value,
      end_char: ec.value,
      all_end_char: aec.value,
      exclude_chars: exc.value,
      ban_start_chars: bsc.value,
      valid_chars: valid_chars.value,
      len_mode: len_mode?.value || "free",
      max_len: ml.value,
      pos_shift: parseInt(ps.value || 0),
      use_shift: use_shift.checked,
      ks_abs: parseInt(ks_abs.value),
      shift_mode: "abs",

      allow_daku: allow_daku.checked,
      allow_handaku: allow_handaku.checked,
      auto_recovery: auto_recovery.checked,
      char_limit_mode: char_limit_mode.checked,
      unify_small: unify_small.checked,
      round_trip: rt.checked,
      exclude_conjugate: exclude_conjugate.checked,

      timeout_enabled: timeout_enabled.checked,
      timeout_sec: parseFloat(timeout_sec.value),
      limit_enabled: limit_enabled.checked,
      limit: parseInt(limit.value),

      categories: Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c => c.value),
      red_words: Object.keys(wordStates).filter(k => wordStates[k] === 'red'),
      blue_words: Object.keys(wordStates).filter(k => wordStates[k] === 'blue'),

      ttl: ttl.value
    };

    const r = await fetch('/search', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });

    const d = await r.json();
    currentRoutes = d.routes || [];
    display();

  } finally {
    btn.innerText = "Explore";
    btn.disabled = false;
  }
}

function display() {
  res.innerHTML = currentRoutes.map((rt, i) => `
    <div class="glass p-4 rounded-2xl">
      <div class="flex justify-between text-[10px] font-black text-slate-400">
        <span>#${i+1}</span>
        <button onclick="copyOne(${i})" class="text-blue-600">Copy</button>
      </div>
      <div class="font-bold text-sm">${rt.join(' → ')}</div>
      <div class="text-[9px] font-black text-blue-500">${rt.join('').length} letters</div>
    </div>
  `).join('');

  if (realtime_enabled.checked) {
    stats.innerText = `${currentRoutes.length} ROUTES FOUND`;
    stats.classList.remove('hidden');
  } else {
    stats.classList.add('hidden');
  }
}

function copyOne(i) {
  navigator.clipboard.writeText(currentRoutes[i].join(' → '));
}

function copyTopN() {
  const n = parseInt(copy_limit.value);
  navigator.clipboard.writeText(
    currentRoutes.slice(0, n).map(rt => rt.join(' → ')).join('\n')
  );
}

window.onload = init;
</script>
</body>
</html>
