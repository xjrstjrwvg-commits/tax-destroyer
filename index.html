<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>国名スプリントシャウト・ソルバー＋出題モード</title>

<style>
html, body { touch-action: manipulation; }
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 20px;
    background: #fafafa;
    color: #333;
    max-width: 600px;
    margin: auto;
}

/* ============================
   タブ UI
============================ */
#tabs {
    display: flex;
    border-bottom: 2px solid #007aff;
    margin-bottom: 10px;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 20px;
    background: #e5e5e5;
    color: #333;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}

.tab.active {
    background: #007aff;
    color: white;
    font-weight: bold;
}

.screen {
    display: none;
}

.screen.active {
    display: block;
}

/* ============================
   共通UI
============================ */
input[type="text"], input[type="number"], select {
    width: 100%;
    font-size: 20px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    margin-top: 10px;
}

input[type="checkbox"] {
    width: 24px;
    height: 24px;
    transform: scale(1.4);
    margin-right: 6px;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    background: #007aff;
    color: white;
    margin-top: 10px;
}

.dict-select {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.dict-option {
    flex: 1;
    background: #f0f0f0;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    border: 2px solid transparent;
}

.dict-option.selected {
    border-color: #007aff;
    background: #e8f0ff;
}

pre {
    background: #fff;
    padding: 16px;
    border-radius: 8px;
    white-space: pre-wrap;
    border: 1px solid #ddd;
    margin-top: 10px;
}
</style>
</head>
<body>

<!-- ============================
   タブ
============================ -->
<div id="tabs">
    <div id="tab-solver" class="tab active">ソルバー</div>
    <div id="tab-generator" class="tab">出題モード</div>
</div>

<!-- ============================
   ソルバー画面
============================ -->
<div id="screen-solver" class="screen active">

    <h3>ソルバー</h3>

    <input id="pattern" type="text" placeholder="例：〇メ〇〇 / 1〇1〇">

    <div class="dict-select">
        <label class="dict-option selected" id="opt-country">
            <input type="radio" name="dict" value="country" checked> 国名
        </label>
        <label class="dict-option" id="opt-capital">
            <input type="radio" name="dict" value="capital"> 首都
        </label>
        <label class="dict-option" id="opt-both">
            <input type="radio" name="dict" value="both"> 両方
        </label>
    </div>

    <div style="margin-top:10px;">
        <input type="checkbox" id="shiritori">
        <label for="shiritori">しりとりモード（複数連結）</label>
    </div>

    <button onclick="runSolve()">解く</button>

    <pre id="result-solver">ここに結果が表示されます</pre>
</div>

<!-- ============================
   出題モード画面
============================ -->
<div id="screen-generator" class="screen">

    <h3>出題モード</h3>

    <label>文字数</label>
    <input id="genLen" type="number" value="6" min="2">

    <label>出題方式</label>
    <select id="genMode">
        <option value="all">全通り</option>
        <option value="random">ランダム n 通り</option>
    </select>

    <div id="randomBox">
        n = <input id="genRandomN" type="number" value="30" min="1" style="width:80px;">
    </div>

    <label>解の通り数条件</label>
    <select id="genCond">
        <option value="eq">ちょうど N 通り</option>
        <option value="ge">N 通り以上</option>
        <option value="le">N 通り以下</option>
    </select>

    N = <input id="genCondN" type="number" value="1" min="1" style="width:80px;">

    <div style="margin-top:10px;">辞書を選択：</div>
    <div class="dict-select">
        <label class="dict-option selected" id="opt-country2">
            <input type="radio" name="dict2" value="country" checked> 国名
        </label>
        <label class="dict-option" id="opt-capital2">
            <input type="radio" name="dict2" value="capital"> 首都
        </label>
        <label class="dict-option" id="opt-both2">
            <input type="radio" name="dict2" value="both"> 両方
        </label>
    </div>

    <div style="margin-top:10px;">
        <input type="checkbox" id="genShiritori">
        <label for="genShiritori">しりとりモード（複数連結）</label>
    </div>

    <div style="margin-top:10px;">
        <input type="checkbox" id="genShowCount" checked>
        <label for="genShowCount">解の数を表示する</label>
    </div>

    <label>例の表示</label>
    <select id="genExampleMode">
        <option value="none">なし</option>
        <option value="one">1つだけ</option>
        <option value="all">すべて</option>
    </select>

    <button onclick="runGenerate()">出題する</button>

    <pre id="result-generator">ここに出題結果が表示されます</pre>
</div>

<script src="dictionary.js"></script>

<script>
/* ============================
   タブ切り替え
============================ */
document.getElementById("tab-solver").onclick = () => {
    document.getElementById("tab-solver").classList.add("active");
    document.getElementById("tab-generator").classList.remove("active");
    document.getElementById("screen-solver").classList.add("active");
    document.getElementById("screen-generator").classList.remove("active");
};

document.getElementById("tab-generator").onclick = () => {
    document.getElementById("tab-generator").classList.add("active");
    document.getElementById("tab-solver").classList.remove("active");
    document.getElementById("screen-generator").classList.add("active");
    document.getElementById("screen-solver").classList.remove("active");
};

/* ============================
   正規化（〇・○、①②→1,2）
============================ */
function normalizeInput(str) {
    str = str.replace(/[\uff61-\uff9f]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
    str = str.replace(/[\u3041-\u3096]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
    str = str.replace(/○/g, "〇");

    const circled = { "①":"1","②":"2","③":"3","④":"4","⑤":"5","⑥":"6","⑦":"7","⑧":"8","⑨":"9" };
    str = str.replace(/[①②③④⑤⑥⑦⑧⑨]/g, ch => circled[ch]);

    return str;
}

/* ============================
   パターン一致
============================ */
function matchPattern(pattern, word) {
    if (pattern.length !== word.length) return false;

    const mapNumToChar = {};
    const usedChars = {};

    for (let i=0;i<pattern.length;i++){
        const p = pattern[i];
        const w = word[i];

        if (p === "〇") continue;

        if (/[0-9]/.test(p)) {
            if (!mapNumToChar[p]) {
                if (usedChars[w] && usedChars[w] !== p) return false;
                mapNumToChar[p] = w;
                usedChars[w] = p;
            } else {
                if (mapNumToChar[p] !== w) return false;
            }
        } else {
            if (p !== w) return false;
        }
    }
    return true;
}

/* ============================
   しりとり連結
============================ */
function generateShiritoriChains(list, maxLength=4){
    const results=[];
    function dfs(chain,last){
        if(chain.length>=maxLength) return;
        for(const c of list){
            if(chain.includes(c)) continue;
            if(last && !c.startsWith(last)) continue;
            const newChain=[...chain,c];
            results.push(newChain);
            dfs(newChain,c[c.length-1]);
        }
    }
    for(const c of list){
        dfs([c],c[c.length-1]);
    }
    return results;
}

/* ============================
   ソルバー本体
============================ */
function solvePattern(inputPattern, shiritoriMode, dictMode){
    const pattern = normalizeInput(inputPattern);

    let list=[];
    if(dictMode==="country") list=window.DICT.country;
    if(dictMode==="capital") list=window.DICT.capital;
    if(dictMode==="both") list=[...window.DICT.country,...window.DICT.capital];

    let candidates=[];

    if(shiritoriMode){
        const chains=generateShiritoriChains(list,4);
        for(const chain of chains){
            const joined=chain.join("");
            if(joined.length===pattern.length && matchPattern(pattern,joined)){
                candidates.push(chain);
            }
        }
    } else {
        for(const w of list){
            if(matchPattern(pattern,w)){
                candidates.push([w]);
            }
        }
    }
    return candidates;
}

/* ============================
   出題モード：伏せ字生成
============================ */
function generatePatternsFromWord(word){
    const len = word.length;
    const patterns=[];

    for(let mask=1; mask<(1<<len); mask++){
        let p="";
        const map={};
        let nextNum=1;

        for(let i=0;i<len;i++){
            if(mask & (1<<i)){
                const ch = word[i];
                if(!map[ch]) map[ch]=String(nextNum++);
                p += map[ch];
            } else {
                p += "〇";
            }
        }
        patterns.push(p);
    }
    return patterns;
}

/* ============================
   出題モード本体
============================ */
function runGenerate(){
    const len = Number(document.getElementById("genLen").value);
    const mode = document.getElementById("genMode").value;
    const randN = Number(document.getElementById("genRandomN").value);
    const cond = document.getElementById("genCond").value;
    const condN = Number(document.getElementById("genCondN").value);
    const dictMode = document.querySelector("input[name=dict2]:checked").value;
    const shiritori = document.getElementById("genShiritori").checked;

    const showCount = document.getElementById("genShowCount").checked;
    const exampleMode = document.getElementById("genExampleMode").value;

    let list=[];
    if(dictMode==="country") list=window.DICT.country;
    if(dictMode==="capital") list=window.DICT.capital;
    if(dictMode==="both") list=[...window.DICT.country,...window.DICT.capital];

    let baseWords=[];

    if(shiritori){
        const chains=generateShiritoriChains(list,4);
        for(const chain of chains){
            const joined=chain.join("");
            if(joined.length===len) baseWords.push(joined);
        }
    } else {
        baseWords = list.filter(w => w.length===len);
    }

    if(mode==="random"){
        baseWords = baseWords.sort(()=>Math.random()-0.5).slice(0,randN);
    }

    let results=[];

    for(const w of baseWords){
        const patterns = generatePatternsFromWord(w);

        for(const p of patterns){
            const sols = solvePattern(p, shiritori, dictMode);
            const cnt = sols.length;

            let ok=false;
            if(cond==="eq" && cnt===condN) ok=true;
            if(cond==="ge" && cnt>=condN) ok=true;
            if(cond==="le" && cnt<=condN) ok=true;

            if(ok){
                let example="";
                if(exampleMode==="one" && sols.length>0){
                    example = sols[0].join(" → ");
                }
                if(exampleMode==="all"){
                    example = sols.map(s=>s.join(" → ")).join("\n");
                }

                results.push({pattern:p,count:cnt,example});
            }
        }
    }

    if(results.length===0){
        document.getElementById("result-generator").textContent="該当なし";
        return;
    }

    let out="";
    for(const r of results){
        out += `【問題】${r.pattern}\n`;
        if(showCount) out += `解の数：${r.count}\n`;
        if(r.example){
            out += `例：\n${r.example}\n`;
        }
        out += "\n";
    }

    document.getElementById("result-generator").textContent = out;
}

/* ============================
   ソルバー UI
============================ */
function runSolve(){
    const p=document.getElementById("pattern").value;
    const s=document.getElementById("shiritori").checked;
    const dictMode=document.querySelector("input[name=dict]:checked").value;

    const res=solvePattern(p,s,dictMode);

    if(res.length===0){
        document.getElementById("result-solver").textContent="一致なし";
        return;
    }

    let out="";
    for(const chain of res){
        out += chain.join(" → ") + "\n";
    }
    document.getElementById("result-solver").textContent=out;
}

/* 辞書選択の見た目 */
document.querySelectorAll(".dict-option").forEach(opt=>{
    opt.addEventListener("click",()=>{
        document.querySelectorAll(".dict-option").forEach(o=>o.classList.remove("selected"));
        opt.classList.add("selected");
    });
});
</script>

</body>
</html>
